<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256">
    <defs>
        <!--
          Single logo for light and dark: only area inside circle is visible (transparent outside).
          Light: circle = primary, wave = primary bg (white).
          Dark (reverse): circle = primary bg / light, wave = primary (blue).
          Uses theme variables when SVG is inlined; prefers-color-scheme when used as img/favicon.
        -->
        <style>
            .jp-logo-circle { fill: var(--jp-theme-color-primary-dark, #005999); }
            .jp-logo-pulse { stroke: var(--jp-theme-bg-primary, white); }
            @media (prefers-color-scheme: dark) {
                .jp-logo-circle { fill: var(--jp-theme-text-primary, #f7fafc); }
                .jp-logo-pulse { stroke: var(--jp-theme-color-primary-dark, #2c5282); }
            }
        </style>
        <mask id="circleMask">
            <circle cx="128" cy="128" r="128" fill="white"/>
        </mask>
    </defs>
    <g mask="url(#circleMask)">
        <circle class="jp-logo-circle" cx="128" cy="128" r="128"/>
        <path class="jp-logo-pulse" d="M0 128h74.67l32 85.34l42.68 -170.68l32 85.34H256" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
</svg>
