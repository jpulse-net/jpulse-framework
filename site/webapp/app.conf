// Site configuration for the jPulse Framework development instance
// This file is committed. It does not contain secrets.
// Per-environment secrets and deployment mode are in site/webapp/app-secret.conf (gitignored).
//
// Default behavior without app-secret.conf:
//   deployment.mode defaults to 'dev' — npm start works with zero extra setup
{
    app: {
        site: {
            name:       'jPulse Framework Custom Site',
            shortName:  'jPulse Custom Site',
            copyright:  '© 2026 My Company',
            version:    '0.5.0',
            release:    '2026-03-08',
            logoUrl:    '/images/jpulse-logo/jpulse-logo-reverse.svg',
            logoAlt:    'jPulse'
        },
        siteId:         'jpulse-framework',
        domainName:     'localhost',
        customField:    'The sky is the limit!',
        customFlag:     true
    },

    // deployment.mode is in site/webapp/app-secret.conf (per-environment)
    // Both sections are here so the same app.conf works for all environments
    deployment: {
        mode:   'dev',          // safe default; prod overrides to 'prod' in app-secret.conf
        dev: {
            name:   'development',
            db:     'jp-dev',
            port:   8080
        },
        prod: {
            name:   'production',
            db:     'jp-prod',
            port:   8081
        }
    },

    // Dev-safe session secret — overridden by real secret in app-secret.conf for production
    middleware: {
        session: {
            secret:     'dev-only-insecure-do-not-use-in-production',
            touchAfter: 3600
        }
    },

    database: {
        mode: 'standalone'
    },

    redis: {
        enabled:    true,
        mode:       'single',
        single: {
            host:   'localhost',
            port:   6379
        }
    },

    // Site-specific features
    features: {
        customDashboard:    true,
        siteAnalytics:      true,
        customTheme:        'blue'
    }
}

// EOF site/webapp/app.conf
